<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Serene 🌿</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sage:        #4a7c6f;
      --sage-light:  #e8f0ee;
      --sage-mid:    #c2d9d3;
      --sage-dark:   #2d5a50;
      --cream:       #faf8f4;
      --cream-dark:  #f0ede6;
      --text-main:   #1e2d2b;
      --text-muted:  #6b8a84;
      --text-light:  #9ab5af;
      --white:       #ffffff;
      --radius:      18px;
      --radius-sm:   10px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      color: var(--text-main);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.5rem;
      background: var(--white);
      border-bottom: 1px solid var(--sage-mid);
      flex-shrink: 0;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand-icon {
      width: 36px;
      height: 36px;
      background: var(--sage);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
    }

    .brand-text h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.2rem;
      color: var(--sage-dark);
      letter-spacing: 0.01em;
    }

    .brand-text p {
      font-size: 0.72rem;
      color: var(--text-muted);
      font-weight: 300;
      letter-spacing: 0.03em;
    }

    .status-dot {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .dot {
      width: 7px;
      height: 7px;
      background: #6dbf9e;
      border-radius: 50%;
      animation: pulse 2.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.5; transform: scale(0.85); }
    }

    /* ── Chat area ── */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      scroll-behavior: smooth;
    }

    #chat::-webkit-scrollbar { width: 4px; }
    #chat::-webkit-scrollbar-track { background: transparent; }
    #chat::-webkit-scrollbar-thumb { background: var(--sage-mid); border-radius: 10px; }

    /* ── Messages ── */
    .msg-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      opacity: 0;
      transform: translateY(10px);
      animation: fadeUp 0.35s ease forwards;
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    .msg-row.user { flex-direction: row-reverse; }

    .avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      background: var(--sage);
    }

    .avatar.user-av {
      background: var(--sage-mid);
      font-size: 11px;
      font-weight: 500;
      color: var(--sage-dark);
    }

    .bubble {
      max-width: min(68%, 520px);
      padding: 0.75rem 1rem;
      border-radius: var(--radius);
      font-size: 0.92rem;
      line-height: 1.65;
      position: relative;
    }

    .bubble.serene {
      background: var(--white);
      color: var(--text-main);
      border: 1px solid var(--sage-mid);
      border-bottom-left-radius: 4px;
    }

    .bubble.user {
      background: var(--sage);
      color: var(--white);
      border-bottom-right-radius: 4px;
    }

    /* ── Typing indicator ── */
    .typing-row { display: flex; align-items: flex-end; gap: 8px; }

    .typing-bubble {
      background: var(--white);
      border: 1px solid var(--sage-mid);
      border-radius: var(--radius);
      border-bottom-left-radius: 4px;
      padding: 0.75rem 1rem;
      display: flex;
      gap: 5px;
      align-items: center;
    }

    .typing-bubble span {
      width: 7px;
      height: 7px;
      background: var(--sage-mid);
      border-radius: 50%;
      animation: bounce 1.2s ease-in-out infinite;
    }

    .typing-bubble span:nth-child(2) { animation-delay: 0.18s; }
    .typing-bubble span:nth-child(3) { animation-delay: 0.36s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); background: var(--sage-mid); }
      30%            { transform: translateY(-5px); background: var(--sage); }
    }

    /* ── Input bar ── */
    footer {
      padding: 0.75rem 1rem 1rem;
      background: var(--white);
      border-top: 1px solid var(--sage-mid);
      flex-shrink: 0;
    }

    .input-wrap {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      background: var(--cream);
      border: 1.5px solid var(--sage-mid);
      border-radius: 24px;
      padding: 8px 8px 8px 16px;
      transition: border-color 0.2s;
    }

    .input-wrap:focus-within { border-color: var(--sage); }

    #input {
      flex: 1;
      border: none;
      background: transparent;
      resize: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.92rem;
      color: var(--text-main);
      line-height: 1.5;
      max-height: 120px;
      outline: none;
    }

    #input::placeholder { color: var(--text-light); }

    #send-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: none;
      background: var(--sage);
      color: var(--white);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s, transform 0.1s;
    }

    #send-btn:hover  { background: var(--sage-dark); }
    #send-btn:active { transform: scale(0.93); }
    #send-btn:disabled { background: var(--sage-mid); cursor: not-allowed; }

    #send-btn svg { width: 16px; height: 16px; }

    .footer-hint {
      text-align: center;
      font-size: 0.68rem;
      color: var(--text-light);
      margin-top: 6px;
      letter-spacing: 0.02em;
    }

    /* ── Reset button ── */
    .reset-btn {
      background: none;
      border: 1px solid var(--sage-mid);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 0.72rem;
      color: var(--text-muted);
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.2s;
    }

    .reset-btn:hover {
      background: var(--sage-light);
      border-color: var(--sage);
      color: var(--sage-dark);
    }

    /* ── RTL support for Arabic ── */
    .bubble[dir="rtl"] {
      text-align: right;
      font-size: 0.97rem;
      line-height: 1.75;
    }
  </style>
</head>
<body>

  <header>
    <div class="brand">
      <div class="brand-icon">🌿</div>
      <div class="brand-text">
        <h1>Serene</h1>
        <p>your calm space · مساحتك الهادئة · ton espace calme</p>
      </div>
    </div>
    <div style="display:flex; align-items:center; gap:10px;">
      <button class="reset-btn" onclick="resetSession()">New chat</button>
      <div class="status-dot">
        <div class="dot"></div>
        <span>here for you</span>
      </div>
    </div>
  </header>

  <div id="chat"></div>

  <footer>
    <div class="input-wrap">
      <textarea
        id="input"
        rows="1"
        placeholder="How are you feeling today?"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"
      ></textarea>
      <button id="send-btn" onclick="sendMessage()" aria-label="Send">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
    <p class="footer-hint">Serene is an AI companion, not a therapist. For emergencies call 0800 008 008</p>
  </footer>

  <script>
    const chat = document.getElementById('chat');
    const input = document.getElementById('input');
    const sendBtn = document.getElementById('send-btn');

    // ── Detect Arabic text for RTL ──
    function isArabic(text) {
      return /[\u0600-\u06FF]/.test(text);
    }

    // ── Append a message bubble ──
    function appendMessage(text, sender) {
      const row = document.createElement('div');
      row.className = `msg-row ${sender}`;

      const av = document.createElement('div');
      av.className = sender === 'user' ? 'avatar user-av' : 'avatar';
      av.textContent = sender === 'user' ? 'you' : '🌿';

      const bubble = document.createElement('div');
      bubble.className = `bubble ${sender}`;
      bubble.textContent = text;
      if (isArabic(text)) bubble.setAttribute('dir', 'rtl');

      row.appendChild(av);
      row.appendChild(bubble);
      chat.appendChild(row);
      chat.scrollTop = chat.scrollHeight;
    }

    // ── Typing indicator ──
    function showTyping() {
      const row = document.createElement('div');
      row.className = 'typing-row';
      row.id = 'typing';

      const av = document.createElement('div');
      av.className = 'avatar';
      av.textContent = '🌿';

      const bubble = document.createElement('div');
      bubble.className = 'typing-bubble';
      bubble.innerHTML = '<span></span><span></span><span></span>';

      row.appendChild(av);
      row.appendChild(bubble);
      chat.appendChild(row);
      chat.scrollTop = chat.scrollHeight;
    }

    function hideTyping() {
      const el = document.getElementById('typing');
      if (el) el.remove();
    }

    // ── Send message ──
    async function sendMessage() {
      const text = input.value.trim();
      if (!text) return;

      appendMessage(text, 'user');
      input.value = '';
      autoResize(input);
      sendBtn.disabled = true;
      showTyping();

      try {
        const res = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text })
        });
        const data = await res.json();
        hideTyping();
        appendMessage(data.reply || data.error, 'serene');
      } catch (err) {
        hideTyping();
        appendMessage("I'm having a little trouble connecting right now. 🌿 Give it a moment and try again.", 'serene');
      } finally {
        sendBtn.disabled = false;
        input.focus();
      }
    }

    // ── Reset session ──
    async function resetSession() {
      try {
        await fetch('/reset', { method: 'POST' });
      } catch (_) {}
      chat.innerHTML = '';
      loadWelcome();
    }

    // ── Auto-resize textarea ──
    function autoResize(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    }

    // ── Enter to send (Shift+Enter for newline) ──
    function handleKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    }

    // ── Load welcome message on start ──
    async function loadWelcome() {
      showTyping();
      try {
        const res = await fetch('/welcome');
        const data = await res.json();
        hideTyping();
        // Small delay for natural feel
        setTimeout(() => appendMessage(data.message, 'serene'), 100);
      } catch (_) {
        hideTyping();
        appendMessage("Hey, I'm Serene 🌿 This is your calm space. What's on your mind today?", 'serene');
      }
    }

    loadWelcome();
  </script>

</body>
</html>
